name: setup-nix

inputs:
  system:
    type: string
    required: true
  sandbox:
    type: string
    default: "true"
  extra-nix-config:
    type: string
    default: ""
  builders:
    type: string
    default: ""
  ssh-key:
    type: string
    default: ""
  ssh-cert:
    type: string
    default: ""

runs:
  using: composite
  steps:
    - name: reclaim space (linux)
      if: runner.os == 'Linux' && inputs.system != 'riscv64-linux'
      uses: wimpysworld/nothing-but-nix@main
      with:
        hatchet-protocol: rampage

    - name: enable unprivileged userns clone
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        sudo sysctl -w kernel.unprivileged_userns_clone=1

    - name: reclaim space (darwin)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        echo "::group::disk space (before)"
        sudo df -h
        echo "::endgroup::"

        echo "::group::disable mds"
        sudo mdutil -i off -a || echo "mdutil failed"
        sudo launchctl unload -w /System/Library/LaunchDaemons/com.apple.metadata.mds.plist \
         || echo "launchctl unload failed"
        echo "::endgroup::"

        echo "Background space expansion started. /nix will grow as space becomes available."
        sudo rm -rf \
          /Applications/Xcode_* \
          /Library/Developer/CoreSimulator \
          /Library/Frameworks \
          /Users/runner/.dotnet \
          /Users/runner/.rustup \
          /Users/runner/Library/Android \
          /Users/runner/Library/Caches \
          /Users/runner/Library/Developer/CoreSimulator \
          /Users/runner/hostedtoolcache &

    - name: prepare remote builder config
      if: ${{ inputs.builders != '' && inputs.ssh-key != '' }}
      env:
        BUILDERS: ${{ inputs.builders }}
        SSH_KEY: ${{ inputs.ssh-key }}
        SSH_CERT: ${{ inputs.ssh-cert }}
      shell: bash
      run: |
        set -euo pipefail
        sudo mkdir -p /etc/nix/
        echo -e "$BUILDERS" | sudo tee /etc/nix/machines
        echo -e "$SSH_KEY" | sudo tee /etc/nix/ssh_id > /dev/null
        echo -e "$SSH_CERT" | sudo tee /etc/nix/ssh_id-cert.pub > /dev/null
        sudo chmod 400 /etc/nix/ssh_id{,-cert.pub}

    - name: install nix
      uses: cachix/install-nix-action@v31
      with:
        # Putting build-dir in /nix is a workaround for https://github.com/wimpysworld/nothing-but-nix/issues/18
        extra_nix_config: |
          accept-flake-config = true
          build-dir = /nix/build
          builders = @/etc/nix/machines
          builders-use-substitutes = true
          sandbox = ${{ inputs.sandbox }}
          system = ${{ inputs.system }}
          extra-system-features = nixos-test benchmark big-parallel kvm
          fallback = true
          ${{ inputs.extra-nix-config }}

    - name: Build niks3
      id: niks3
      shell: bash
      run: |
        path=$(nix build nixpkgs#niks3 --print-out-paths --no-link)
        echo "store-path=$path" >> "$GITHUB_OUTPUT"

    - uses: Mic92/niks3-action@v1
      with:
        server-url: https://niks3.s.ihavenojob.work
        niks3-bin: ${{ steps.niks3.outputs.store-path }}/bin/niks3
        substituter: "https://niks3.gweb.ihavenojob.work?priority=90"

    - name: create build-dir
      shell: bash
      run: sudo mkdir -p /nix/build

    - name: post setup-nix
      if: runner.os == 'macOS'
      uses: srz-zumix/post-run-action@v3
      with:
        shell: bash -e {0}
        post-run: |
          echo "::group::disk space (after)"
          sudo df -h
          echo "::endgroup::"
